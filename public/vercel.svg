<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <!-- Deep, premium dark background gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0e15" />
      <stop offset="100%" stop-color="#1a1c29" />
    </linearGradient>

    <!-- Sleek metallic/gold gradient for the primary letter structure -->
    <linearGradient id="gold-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c5a059" />
      <stop offset="30%" stop-color="#fdf0cd" />
      <stop offset="70%" stop-color="#d4af37" />
      <stop offset="100%" stop-color="#f3e5ab" />
    </linearGradient>

    <!-- Soft glow effect for an elegant ambiance -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Canvas -->
  <rect width="100%" height="100%" fill="url(#bg-grad)" />

  <!-- Subtle Geometric Accent Line in Background -->
  <line x1="250" y1="50" x2="250" y2="450" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1" />
  <circle cx="250" cy="250" r="180" fill="none" stroke="#ffffff" stroke-opacity="0.02" stroke-width="1" />

  <!-- The Letter "A" Structure -->
  <g transform="translate(0, 10)" filter="url(#glow)">
    
    <!-- Left Stem (Thicker, dominant architectural pillar) -->
    <path d="M 220 110 
             L 110 390 
             L 155 390 
             L 242 165 
             Z" 
          fill="url(#gold-grad)" />

    <!-- Right Stem (Sleek, detached minimalist stroke) -->
    <path d="M 258 165 
             L 345 390 
             L 390 390 
             L 280 110 
             Z" 
          fill="url(#gold-grad)" opacity="0.85" />

    <!-- Horizontal Crossbar (Floating, geometric accent) -->
    <path d="M 172 310 
             L 328 310 
             L 320 322 
             L 180 322 
             Z" 
          fill="url(#gold-grad)" />
          
    <!-- Sharp Apex Accent Peak -->
    <polygon points="250,75 254,90 246,90" fill="#fdf0cd" />
  </g>
</svg>
